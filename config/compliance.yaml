# MARA universal facts (14 records, venture='migration', cross-venture retrieve OK)
mara_facts_count: 14
mara_facts_note: "14 MARA + AU compliance facts seeded với venture='migration'. BC9 cross-venture retrieve khi content có visa/migration claim."

# Claim rules, BC9 fact-check patterns
claim_rules:
  forbidden_patterns:
    - pattern: "100%\\s+(success|guarantee|đảm bảo|chắc chắn)"
      reason: "KHÔNG hứa kết quả 100%"
      severity: block
    - pattern: "(monthly|tháng)\\s+(revenue|doanh thu).{0,40}(triệu|million|tr)"
      reason: "Cần fact-check số revenue + có disclaimer + timeline + condition"
      severity: review
    - pattern: "(visa rate|tỷ lệ.{0,10}đậu)"
      reason: "MARA cấm claim visa rate"
      severity: block
      applies_to: ["migration"]
    - pattern: "(thay đổi cuộc đời|breakthrough|đột phá tư duy)\\s+(sau|trong)\\s+\\d+"
      reason: "Sáo rỗng + timeline không có condition"
      severity: review
    - pattern: "\\b(không cần làm gì|passive income).{0,40}(triệu|million|tr)"
      reason: "Passive income claim mà không có effort breakdown"
      severity: block
    - pattern: "\\bMRR\\b|\\bARR\\b.{0,30}(\\d+[KMB])"
      reason: "MRR/ARR specific claim cần verify source + timeline"
      severity: review

# Required disclaimers per content type
required_disclaimers:
  - content_type: "migration_advice"
    text: "Thông tin tham khảo, không phải tư vấn pháp lý chính thức (MARA license dự kiến 1/2027)"
    apply_when: "Content mention visa, immigration, MARA"

  - content_type: "revenue_claim"
    text: "Doanh thu là benchmark cá nhân, không hứa kết quả cụ thể cho mọi venture"
    apply_when: "Content có số revenue claim"

  - content_type: "coaching_outcome"
    text: "Kết quả phụ thuộc nỗ lực + điều kiện cụ thể venture của bạn"
    apply_when: "Content promote Coaching 50M tier"

# Escalation policy
